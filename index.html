<button id="checkBackendBtn">Check Backend</button>
<p id="result"></p>

<script>
  const API_BASE = "https://cotecar-backend-production.up.railway.app";

  document.getElementById("checkBackendBtn").addEventListener("click", async () => {
    const result = document.getElementById("result");
    result.textContent = "Checking backend...";

    try {
      const res = await fetch(`${API_BASE}/health`);
      const data = await res.json();
      result.textContent = "✅ Backend OK: " + JSON.stringify(data);
    } catch (e) {
      result.textContent = "❌ Backend not reachable: " + e.message;
    }
  });
</script>
