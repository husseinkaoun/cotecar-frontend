<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CôteCar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      max-width: 420px;
      width: 100%;
      background: #020617;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    h1 {
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 16px;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-green {
      background: #22c55e;
      color: #052e16;
    }

    .btn-red {
      background: #ef4444;
      color: white;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: #022c22;
      color: #22c55e;
    }

    .error {
      background: #3f1d1d;
      color: #fca5a5;
    }

    .car {
      background: #020617;
      border: 1px solid #1e293b;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .car-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .car-actions {
      margin-top: 8px;
      text-align: right;
    }
  </style>
</head>
<body>

<div class="app">
  <h1>🚗 CôteCar</h1>
  <div class="subtitle">Buy & Sell Cars Easily</div>

  <div class="row">
    <button class="btn-green" onclick="loadCars()">Load Cars</button>
  </div>

  <div id="status"></div>

  <h3>Cars</h3>
  <div id="cars"></div>
</div>

<script>
  const BACKEND_URL = "https://cotecar-backend-production.up.railway.app";

  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.className = isError ? "status error" : "status";
    el.innerText = msg;
  }

  async function loadCars() {
    try {
      const res = await fetch(`${BACKEND_URL}/cars`);
      if (!res.ok) throw new Error("Cars endpoint missing");
      const cars = await res.json();

      renderCars(cars);
      setStatus(`Loaded ${cars.length} car(s).`);
    } catch (err) {
      setStatus("Failed to load cars.", true);
    }
  }

  function renderCars(cars) {
    const container = document.getElementById("cars");
    container.innerHTML = "";

    if (cars.length === 0) {
      container.innerHTML = "<p>No cars available.</p>";
      return;
    }

    cars.forEach(car => {
      const div = document.createElement("div");
      div.className = "car";

      div.innerHTML = `
        <div class="car-title">${car.title}</div>
        <div>Price: €${car.price}</div>
        <div>ID: ${car.id}</div>
        <div class="car-actions">
          <button class="btn-red" onclick="deleteCar(${car.id})">
            Delete
          </button>
        </div>
      `;

      container.appendChild(div);
    });
  }

  async function deleteCar(id) {
    if (!confirm("Delete this car?")) return;

    try {
      const res = await fetch(`${BACKEND_URL}/cars/${id}`, {
        method: "DELETE"
      });

      if (!res.ok) throw new Error("Delete failed");

      setStatus(`Car ${id} deleted.`);
      loadCars();
    } catch (err) {
      setStatus("Failed to delete car.", true);
    }
  }
</script>

</body>
</html>
