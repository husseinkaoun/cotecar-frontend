<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CôteCar</title>
</head>
<body>

<h1>🚗 CôteCar</h1>
<button onclick="loadCars()">Load Cars</button>

<div id="cars"></div>

<script>
const BACKEND = "https://cotecar-backend-production.up.railway.app";

async function loadCars() {
  const cars = [
    { id: 1, title: "Toyota Corolla 2018" },
    { id: 2, title: "BMW X5 2020" },
    { id: 3, title: "Mercedes C200 2019" },
  ];

  const container = document.getElementById("cars");
  container.innerHTML = "";

  cars.forEach(car => {
    container.innerHTML += `
      <div>
        <h3>${car.title}</h3>
        <input type="file" id="file-${car.id}" />
        <button onclick="uploadImage(${car.id})">Upload Image</button>
      </div>
    `;
  });
}

async function uploadImage(carId) {
  const input = document.getElementById(`file-${carId}`);
  if (!input.files.length) {
    alert("Pick an image first");
    return;
  }

  const formData = new FormData();
  formData.append("image", input.files[0]);

  try {
    const res = await fetch(`${BACKEND}/cars/${carId}/image`, {
      method: "POST",
      body: formData,
    });

    if (!res.ok) {
      const text = await res.text();
      console.error(text);
      throw new Error("Upload failed");
    }

    alert("Upload successful");
  } catch (e) {
    alert("Upload failed");
    console.error(e);
  }
}
</script>

</body>
</html>
