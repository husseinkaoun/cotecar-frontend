<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CôteCar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background: #0b1220;
      font-family: Arial, sans-serif;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      max-width: 420px;
      width: 100%;
    }
    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    .green { background: #22c55e; }
    .red { background: #ef4444; color: #fff; }
    .car {
      background: #020617;
      padding: 14px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>🚗 CôteCar</h2>
  <p>Buy & Sell Cars Easily</p>

  <button class="green" onclick="loadCars()">Load Cars</button>
  <div id="status"></div>

  <h3>Cars</h3>
  <div id="cars"></div>
</div>

<script>
  const BACKEND = 'https://cotecar-backend-production.up.railway.app';

  async function loadCars() {
    const res = await fetch(`${BACKEND}/cars`);
    const cars = await res.json();

    document.getElementById('status').innerHTML =
      `<div class="green">Loaded ${cars.length} car(s).</div>`;

    const list = document.getElementById('cars');
    list.innerHTML = '';

    cars.forEach(car => {
      list.innerHTML += `
        <div class="car">
          <strong>${car.title}</strong><br/>
          Price: €${car.price}<br/>
          ID: ${car.id}<br/><br/>
          <button class="red" onclick="deleteCar(${car.id})">Delete</button>
        </div>
      `;
    });
  }

  async function deleteCar(id) {
    await fetch(`${BACKEND}/cars/${id}`, { method: 'DELETE' });
    loadCars();
  }
</script>

</body>
</html>
