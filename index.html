<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CôteCar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
    }
    button {
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .delete {
      background: #dc2626;
      color: white;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <h1>🚗 CôteCar</h1>
  <button onclick="loadCars()">Load Cars</button>

  <div id="cars"></div>

  <script>
    const API = "https://cotecar-backend-production.up.railway.app";

    async function loadCars() {
      const res = await fetch(API + "/cars");
      const cars = await res.json();

      const container = document.getElementById("cars");
      container.innerHTML = "";

      cars.forEach(car => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <strong>${car.title}</strong><br/>
          Price: €${car.price}<br/>
          ID: ${car.id}<br/>
          <button class="delete" onclick="deleteCar(${car.id})">Delete</button>
        `;

        container.appendChild(div);
      });
    }

    async function deleteCar(id) {
      if (!confirm("Delete this car?")) return;

      await fetch(API + "/cars/" + id, {
        method: "DELETE",
      });

      loadCars();
    }
  </script>
</body>
</html>
