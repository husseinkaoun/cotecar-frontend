<script>
const BACKEND = "https://cotecar-backend-production.up.railway.app";

async function uploadImage(carId, inputId) {
  const input = document.getElementById(inputId);

  if (!input.files || !input.files[0]) {
    alert("Pick an image first");
    return;
  }

  const formData = new FormData();
  formData.append("image", input.files[0]); // MUST be "image"

  try {
    const res = await fetch(`${BACKEND}/cars/${carId}/image`, {
      method: "POST",
      body: formData,
    });

    if (!res.ok) {
      const text = await res.text();
      console.error(text);
      throw new Error("Upload failed");
    }

    const data = await res.json();
    alert("Upload successful");
    loadCars();
  } catch (e) {
    alert("Upload failed");
    console.error(e);
  }
}
</script>
<input type="file" id="file-1" />
<button onclick="uploadImage(1, 'file-1')">Upload Image</button>
