<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CôteCar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .card {
      background: #020617;
      padding: 24px;
      border-radius: 12px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
    }

    button {
      margin: 6px 0;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .primary {
      background: #16a34a;
      color: white;
    }

    .secondary {
      background: #334155;
      color: white;
    }

    .error {
      background: #7f1d1d;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
    }

    ul {
      padding-left: 18px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚗 CôteCar</h1>
    <p>Buy & Sell Cars Easily</p>

    <button class="secondary" onclick="checkBackend()">Check Backend</button>
    <button class="primary" onclick="loadCars()">Load Cars</button>
    <button class="secondary" onclick="addDemoCar()">Add Demo Car</button>

    <div id="message"></div>

    <h2>Cars</h2>
    <ul id="cars"></ul>
  </div>

  <script>
    // ✅ CORRECT BACKEND URL
    const API_BASE = "https://cotecar-backend-production.up.railway.app";

    const messageEl = document.getElementById("message");
    const carsEl = document.getElementById("cars");

    function showMessage(text, isError = false) {
      messageEl.innerHTML = text
        ? `<div class="${isError ? "error" : ""}">${text}</div>`
        : "";
    }

    async function checkBackend() {
      showMessage("");
      try {
        const res = await fetch(`${API_BASE}/cars`);
        if (!res.ok) throw new Error("Backend not responding");
        showMessage("✅ Backend is online");
      } catch (err) {
        showMessage("❌ Backend check failed", true);
      }
    }

    async function loadCars() {
      showMessage("");
      carsEl.innerHTML = "";
      try {
        const res = await fetch(`${API_BASE}/cars`);
        if (!res.ok) throw new Error("Failed");
        const cars = await res.json();

        if (cars.length === 0) {
          carsEl.innerHTML = "<li>No cars yet</li>";
          return;
        }

        cars.forEach(car => {
          const li = document.createElement("li");
          li.textContent = `${car.title} — €${car.price}`;
          carsEl.appendChild(li);
        });
      } catch (err) {
        showMessage("❌ Failed to load cars", true);
      }
    }

    async function addDemoCar() {
      showMessage("");
      try {
        const res = await fetch(`${API_BASE}/cars/demo`, {
          method: "POST",
        });
        if (!res.ok) throw new Error("Failed");
        showMessage("✅ Demo car added");
        loadCars();
      } catch (err) {
        showMessage("❌ Add demo car failed", true);
      }
    }
  </script>
</body>
</html>
