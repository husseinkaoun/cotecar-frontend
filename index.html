<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CôteCar</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;padding:20px}
    .card{max-width:720px;margin:0 auto;background:#020617;border:1px solid #1e293b;border-radius:16px;padding:18px}
    button{padding:10px 14px;border:0;border-radius:10px;font-weight:700;cursor:pointer}
    .green{background:#22c55e;color:#052e16}
    .red{background:#ef4444;color:#fff}
    .car{background:#0b1228;border:1px solid #1e293b;border-radius:14px;padding:14px;margin-top:12px}
    img{width:92px;height:70px;object-fit:cover;border-radius:10px;border:1px solid #1e293b}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    input{background:#0b1228;color:#e5e7eb;border:1px solid #1e293b;border-radius:10px;padding:10px}
  </style>
</head>
<body>
  <div class="card">
    <h1>🚗 CôteCar</h1>
    <p>Buy & Sell Cars Easily</p>

    <div class="row">
      <button class="green" onclick="loadCars()">Load Cars</button>
      <button class="green" onclick="addCarDemo()">Add Demo Car</button>
    </div>

    <div id="cars"></div>
  </div>

<script>
  const BACKEND = "https://cotecar-backend-production.up.railway.app";

  async function loadCars() {
    const res = await fetch(`${BACKEND}/cars`);
    const cars = await res.json();

    const el = document.getElementById("cars");
    el.innerHTML = `<p>Loaded ${cars.length} car(s).</p>`;

    cars.forEach(car => {
      const div = document.createElement("div");
      div.className = "car";

      const inputId = `img_${car.id}`;

      div.innerHTML = `
        <strong>${car.title}</strong><br/>
        €${car.price} — ID: ${car.id}<br/><br/>

        <div class="row">
          <input id="${inputId}" type="file" accept="image/*" />
          <button class="green" onclick="uploadImage(${car.id}, '${inputId}')">Upload Image</button>
          <button class="red" onclick="deleteCar(${car.id})">Delete</button>
        </div>

        <div class="row" style="margin-top:10px;">
          ${(car.images || []).map(img => `<img src="${img.url}" />`).join("")}
        </div>
      `;

      el.appendChild(div);
    });
  }

  async function uploadImage(carId, inputId) {
    const input = document.getElementById(inputId);
    if (!input.files || input.files.length === 0) return alert("Pick an image first");

    const form = new FormData();
    form.append("file", input.files[0]);

    const res = await fetch(`${BACKEND}/cars/${carId}/images`, {
      method: "POST",
      body: form
    });

    if (!res.ok) return alert("Upload failed");
    await loadCars();
  }

  async function deleteCar(id) {
    await fetch(`${BACKEND}/cars/${id}`, { method: "DELETE" });
    await loadCars();
  }

  async function addCarDemo() {
    await fetch(`${BACKEND}/cars`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: "Demo Car " + Date.now(), price: 9999 })
    });
    await loadCars();
  }

  loadCars();
</script>
</body>
</html>
