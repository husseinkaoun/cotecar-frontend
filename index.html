<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CôteCar</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI";
      background: radial-gradient(1000px 700px at 50% -200px, #1b2a4e, #020617);
      color: #e5e7eb;
      padding: 24px;
    }

    .card {
      width: min(520px, 100%);
      background: rgba(10, 18, 40, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55);
      padding: 24px;
    }

    h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 28px;
    }

    .sub {
      color: #9ca3af;
      margin-bottom: 20px;
    }

    button {
      border: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-green {
      background: #22c55e;
      color: #052e16;
    }

    .btn-red {
      background: #ef4444;
      color: white;
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(34, 197, 94, 0.25);
      color: #22c55e;
    }

    .cars {
      margin-top: 20px;
    }

    .car {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .price {
      color: #93c5fd;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚗 CôteCar</h1>
    <div class="sub">Buy & Sell Cars Easily</div>

    <button class="btn-green" onclick="loadCars()">Load Cars</button>

    <div id="status" class="status" style="display:none;"></div>

    <div class="cars" id="cars"></div>
  </div>

  <script>
    // 🔗 BACKEND URL (Railway)
    const BACKEND = "https://cotecar-backend-production.up.railway.app";

    const statusEl = document.getElementById("status");
    const carsEl = document.getElementById("cars");

    function showStatus(text) {
      statusEl.style.display = "block";
      statusEl.textContent = text;
    }

    async function loadCars() {
      const res = await fetch(`${BACKEND}/cars`);
      const cars = await res.json();

      carsEl.innerHTML = "";
      showStatus(`Loaded ${cars.length} car(s).`);

      cars.forEach(car => {
        const div = document.createElement("div");
        div.className = "car";

        div.innerHTML = `
          <div class="row">
            <div>
              <strong>${car.title}</strong><br />
              <span class="price">€${car.price}</span><br />
              ID: ${car.id}
            </div>
            <button class="btn-red" onclick="deleteCar(${car.id})">Delete</button>
          </div>
        `;

        carsEl.appendChild(div);
      });
    }

    async function deleteCar(id) {
      await fetch(`${BACKEND}/cars/${id}`, { method: "DELETE" });
      loadCars();
    }
  </script>
</body>
</html>
