<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CôteCar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .card {
      background: #020617;
      padding: 24px;
      border-radius: 12px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    h1 { margin-top: 0; }

    button {
      margin: 6px 0;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s ease;
    }

    /* Default button look */
    .secondary {
      background: #334155;
      color: white;
    }

    /* Green only when clicked/active */
    button.active {
      background: #16a34a !important;
      color: white !important;
    }

    /* Small press animation */
    button:active {
      transform: scale(0.96);
      opacity: 0.95;
    }

    .error {
      background: #7f1d1d;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .success {
      background: #064e3b;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
    }

    ul { padding-left: 18px; }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚗 CôteCar</h1>
    <p>Buy & Sell Cars Easily</p>

    <!-- All buttons start as secondary (grey).
         Green will appear ONLY when you click a button. -->
    <button id="btnCheck" class="secondary" onclick="checkBackend()">Check Backend</button>
    <button id="btnLoad" class="secondary" onclick="loadCars()">Load Cars</button>
    <button id="btnDemo" class="secondary" onclick="addDemoCar()">Add Demo Car</button>

    <div id="message"></div>

    <h2>Cars</h2>
    <ul id="cars"></ul>
  </div>

  <script>
    // ✅ Your backend URL
    const API_BASE = "https://cotecar-backend-production.up.railway.app";

    const messageEl = document.getElementById("message");
    const carsEl = document.getElementById("cars");

    function showMessage(text, type = "success") {
      if (!text) {
        messageEl.innerHTML = "";
        return;
      }
      const cls = type === "error" ? "error" : "success";
      messageEl.innerHTML = `<div class="${cls}">${text}</div>`;
    }

    // Make ONLY the clicked button green, then clear it after the action finishes
    function setActiveButton(btnId) {
      document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      const btn = document.getElementById(btnId);
      if (btn) btn.classList.add("active");
    }

    function clearActiveButtons() {
      document.querySelectorAll("button").forEach(b => b.classList.remove("active"));
    }

    async function checkBackend() {
      setActiveButton("btnCheck");
      showMessage("");

      try {
        const res = await fetch(`${API_BASE}/cars`, { cache: "no-store" });
        if (!res.ok) throw new Error("Backend not responding");

        showMessage("✅ Backend is online", "success");
      } catch (err) {
        showMessage("❌ Backend check failed", "error");
      } finally {
        // Remove green after a short moment so you can see it
        setTimeout(clearActiveButtons, 500);
      }
    }

    async function loadCars() {
      setActiveButton("btnLoad");
      showMessage("");
      carsEl.innerHTML = "";

      try {
        const res = await fetch(`${API_BASE}/cars`, { cache: "no-store" });
        if (!res.ok) throw new Error("Failed to load cars");

        const cars = await res.json();

        if (!Array.isArray(cars) || cars.length === 0) {
          carsEl.innerHTML = "<li>No cars yet</li>";
          showMessage("✅ Loaded (0 cars)", "success");
          return;
        }

        cars.forEach((car) => {
          const title = (car && car.title) ? String(car.title) : "Untitled car";
          const price = Number(car && car.price ? car.price : 0);

          const li = document.createElement("li");
          li.textContent = `${title} — €${price}`;
          carsEl.appendChild(li);
        });

        showMessage(`✅ Loaded ${cars.length} car(s)`, "success");
      } catch (err) {
        showMessage("❌ Failed to load cars", "error");
      } finally {
        setTimeout(clearActiveButtons, 500);
      }
    }

    async function addDemoCar() {
      setActiveButton("btnDemo");
      showMessage("");

      try {
        const res = await fetch(`${API_BASE}/cars/demo`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
        });

        if (!res.ok) throw new Error("Add demo car failed");

        showMessage("✅ Demo car added", "success");
        await loadCars();
      } catch (err) {
        showMessage("❌ Add demo car failed", "error");
      } finally {
        setTimeout(clearActiveButtons, 500);
      }
    }
  </script>
</body>
</html>
